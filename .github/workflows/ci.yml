name: CI (web)

on:
  push:
    branches: [master]
    paths:
      - "web/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [master]
    paths:
      - "web/**"
      - ".github/workflows/ci.yml"

defaults:
  run:
    working-directory: web

jobs:
  typecheck-lint-test:
    runs-on: ubuntu-latest
    env:
      # No son credenciales reales: solo hacen falta para que el cliente de
      # Supabase pueda construirse sin tirar error al importar el módulo
      # (createClient exige una URL no vacía). Los tests de este job nunca
      # llegan a hacer una llamada de red real contra Supabase.
      VITE_SUPABASE_URL: https://placeholder.supabase.co
      VITE_SUPABASE_ANON_KEY: placeholder-anon-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: typecheck-lint-test
    env:
      # Los tests e2e sólo ejercitan la vista pública sin login (ver
      # e2e/public-landing.spec.ts) — no necesitan un proyecto real de
      # Supabase, sólo que el cliente pueda construirse sin tirar error.
      VITE_SUPABASE_URL: https://placeholder.supabase.co
      VITE_SUPABASE_ANON_KEY: placeholder-anon-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
